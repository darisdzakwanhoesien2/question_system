providers:
  ollama:
    base_url: "http://localhost:11434"
    model: "llama2:7b"
    temperature: 0.7
    max_tokens: 1000
  lmstudio:
    base_url: "http://localhost:1234"
    model: "local-model"
    temperature: 0.7
    max_tokens: 1000
  openrouter:
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    model: "anthropic/claude-3-haiku"
    temperature: 0.7
    max_tokens: 1000

default_provider: "ollama"

tasks:
  essay_grading:
    provider: "openrouter"
    model: "anthropic/claude-3-sonnet"
  short_answer_grading:
    provider: "ollama"
    model: "llama2:13b"
  performance_analysis:
    provider: "openrouter"
    model: "anthropic/claude-3-haiku"
  learning_recommendations:
    provider: "lmstudio"
    model: "local-model"